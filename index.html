<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter,sans-serif;background:#f1f5f9;color:#0f172a;}
header{background:#0f172a;color:white;padding:18px;text-align:center;font-weight:600;font-size:18px;}
.container{padding:20px;}
.card{background:white;border-radius:18px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.06);margin-bottom:20px;}
button{padding:8px 14px;border:none;border-radius:8px;background:#0ea5e9;color:white;cursor:pointer;font-weight:600;}
button.danger{background:#ef4444;}
input,select,textarea{padding:8px;border-radius:8px;border:1px solid #e2e8f0;width:100%;font-size:14px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>Supply Tracker</header>

<div class="container">

<div id="authCard" class="card">
<h3>Autenticazione Dropbox</h3>
<button onclick="loginDropbox()">Login con Dropbox</button>
</div>

<div id="appContent" class="hidden">

<div class="card">
<h3>Nuovo Record</h3>
<input id="user" placeholder="User"><br><br>
<input id="item" placeholder="Item"><br><br>
<input id="qty" type="number" placeholder="Quantità"><br><br>
<select id="tipo">
<option value="acquisto">Acquisto</option>
<option value="noleggio">Noleggio</option>
</select><br><br>
<textarea id="note" placeholder="Note"></textarea><br><br>
<button onclick="addRecord()">Inserisci</button>
</div>

<div class="card">
<table width="100%">
<thead>
<tr>
<th>ID</th><th>User</th><th>Item</th><th>Q.tà</th><th>Stato</th><th>Azioni</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>
</div>

<script>

/* ================= CONFIG ================= */

const DROPBOX_APP_KEY="768n748kurx9034";
const REDIRECT_URI="https://evotechlab.github.io/supplytrackerclient/";
const DROPBOX_FOLDER="/supply_records";

let accessToken=localStorage.getItem("db_access");
let records=[];

/* ================= PKCE ================= */

function generateRandomString(length){
const charset='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
let result='';
for(let i=0;i<length;i++){
result+=charset.charAt(Math.floor(Math.random()*charset.length));
}
return result;
}

async function sha256(plain){
const encoder=new TextEncoder();
const data=encoder.encode(plain);
const hash=await crypto.subtle.digest('SHA-256',data);
return btoa(String.fromCharCode(...new Uint8Array(hash)))
.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function loginDropbox(){

const codeVerifier=generateRandomString(64);
localStorage.setItem("pkce_verifier",codeVerifier);

const codeChallenge=await sha256(codeVerifier);

const authUrl=
"https://www.dropbox.com/oauth2/authorize"+
"?client_id="+DROPBOX_APP_KEY+
"&response_type=code"+
"&redirect_uri="+encodeURIComponent(REDIRECT_URI)+
"&code_challenge="+codeChallenge+
"&code_challenge_method=S256"+
"&token_access_type=online"+
"&scope=files.metadata.read files.metadata.write files.content.read files.content.write";

window.location.href=authUrl;
}

async function handleRedirect(){

const params=new URLSearchParams(window.location.search);
const code=params.get("code");

if(!code) return;

const codeVerifier=localStorage.getItem("pkce_verifier");

const response=await fetch("https://api.dropboxapi.com/oauth2/token",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:new URLSearchParams({
code:code,
grant_type:"authorization_code",
client_id:DROPBOX_APP_KEY,
redirect_uri:REDIRECT_URI,
code_verifier:codeVerifier
})
});

const data=await response.json();

if(!data.access_token){
console.error("OAuth Error:",data);
alert("Errore autenticazione Dropbox");
return;
}

accessToken=data.access_token;
localStorage.setItem("db_access",accessToken);

window.history.replaceState({},document.title,REDIRECT_URI);
}

/* ================= DROPBOX ================= */

async function dropboxFetch(url,options={}){

if(!accessToken){
console.warn("No access token");
return {status:401};
}

options.headers=options.headers||{};
options.headers["Authorization"]="Bearer "+accessToken;

const response=await fetch(url,options);

if(response.status===401){
console.error("Token non valido. Effettuare nuovo login.");
localStorage.removeItem("db_access");
location.reload();
}

return response;
}

async function ensureFolder(){

const response=await dropboxFetch(
"https://api.dropboxapi.com/2/files/create_folder_v2",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({path:DROPBOX_FOLDER,autorename:false})
}
);

// ignore already_exists error
}

/* ================= LOAD ================= */

async function loadData(){

await ensureFolder();

const response=await dropboxFetch(
"https://api.dropboxapi.com/2/files/list_folder",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({path:DROPBOX_FOLDER})
}
);

if(response.status!==200) return;

const data=await response.json();

const files=(data.entries||[]).filter(f=>f.name.startsWith("supply_"));

records=await Promise.all(files.map(async file=>{
const res=await dropboxFetch(
"https://content.dropboxapi.com/2/files/download",
{
method:"POST",
headers:{"Dropbox-API-Arg":JSON.stringify({path:file.path_lower})}
}
);
return await res.json();
}));

render();
}

/* ================= CRUD ================= */

function generateNextId(){
let max=0;
records.forEach(r=>{
const n=parseInt(r.id.replace("SUP-",""));
if(n>max) max=n;
});
return "SUP-"+String(max+1).padStart(4,"0");
}

async function addRecord(){

const id=generateNextId();

const record={
id,
timestamp:new Date().toISOString(),
user:user.value,
item:item.value,
quantita:Number(qty.value),
stato:"inserito",
tipo:tipo.value,
note:note.value
};

await dropboxFetch(
"https://content.dropboxapi.com/2/files/upload",
{
method:"POST",
headers:{
"Content-Type":"application/octet-stream",
"Dropbox-API-Arg":JSON.stringify({
path:`${DROPBOX_FOLDER}/supply_${id}.json`,
mode:"add"
})
},
body:JSON.stringify(record)
}
);

records.push(record);
render();
}

async function deleteRecord(id){

await dropboxFetch(
"https://api.dropboxapi.com/2/files/delete_v2",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({path:`${DROPBOX_FOLDER}/supply_${id}.json`})
}
);

records=records.filter(r=>r.id!==id);
render();
}

function render(){
const tbody=document.getElementById("tableBody");
tbody.innerHTML="";
records.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.user}</td>
<td>${r.item}</td>
<td>${r.quantita}</td>
<td>${r.stato}</td>
<td><button class="danger" onclick="deleteRecord('${r.id}')">Elimina</button></td>
</tr>`;
});
}

/* ================= INIT ================= */

(async ()=>{
await handleRedirect();

if(accessToken){
document.getElementById("authCard").classList.add("hidden");
document.getElementById("appContent").classList.remove("hidden");
loadData();
}
})();

</script>

</body>
</html>
