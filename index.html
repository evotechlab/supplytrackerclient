<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Inter,sans-serif;background:#f1f5f9;color:#0f172a;}
header{background:#0f172a;color:white;padding:18px;text-align:center;font-weight:600;font-size:18px;}
.container{padding:20px;}
.card{background:white;border-radius:18px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.06);margin-bottom:20px;}
button{padding:8px 14px;border:none;border-radius:8px;background:#0ea5e9;color:white;cursor:pointer;font-weight:600;}
button.danger{background:#ef4444;}
input,select,textarea{padding:8px;border-radius:8px;border:1px solid #e2e8f0;width:100%;font-size:14px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>Supply Tracker</header>

<div class="container">

<div id="authCard" class="card">
<h3>Autenticazione Dropbox</h3>
<button onclick="loginDropbox()">Login con Dropbox</button>
</div>

<div id="appContent" class="hidden">

<div class="card">
<h3>Nuovo Record</h3>
<input id="user" placeholder="User"><br><br>
<input id="item" placeholder="Item"><br><br>
<input id="qty" type="number" placeholder="Quantità"><br><br>
<select id="tipo">
<option value="acquisto">Acquisto</option>
<option value="noleggio">Noleggio</option>
</select><br><br>
<textarea id="note" placeholder="Note"></textarea><br><br>
<button onclick="addRecord()">Inserisci</button>
</div>

<div class="card">
<table width="100%">
<thead>
<tr>
<th>ID</th><th>User</th><th>Item</th><th>Q.tà</th><th>Stato</th><th>Azioni</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

</div>

<script>

/* ================= CONFIG ================= */

const DROPBOX_APP_KEY="768n748kurx9034";
const REDIRECT_URI="https://evotechlab.github.io/supplytrackerclient/";
const DROPBOX_FOLDER="/supply_records";

let accessToken=localStorage.getItem("db_access");
let records=[];

/* ================= OAUTH ================= */

function loginDropbox(){
const authUrl=
"https://www.dropbox.com/oauth2/authorize?response_type=token"
+"&client_id="+DROPBOX_APP_KEY
+"&redirect_uri="+encodeURIComponent(REDIRECT_URI);
window.location.href=authUrl;
}

function handleRedirect(){
if(window.location.hash.includes("access_token")){
const params=new URLSearchParams(window.location.hash.substring(1));
accessToken=params.get("access_token");
localStorage.setItem("db_access",accessToken);
window.location.href=REDIRECT_URI;
}
}

/* ================= DROPBOX ================= */

async function dropboxFetch(url,options={}){
options.headers=options.headers||{};
options.headers["Authorization"]="Bearer "+accessToken;
return fetch(url,options);
}

/* ================= CREATE FOLDER ================= */

async function ensureFolder(){
await dropboxFetch(
"https://api.dropboxapi.com/2/files/create_folder_v2",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({path:DROPBOX_FOLDER,autorename:false})
}
);
}

/* ================= LOAD ================= */

async function loadData(){

await ensureFolder();

const response=await dropboxFetch(
"https://api.dropboxapi.com/2/files/list_folder",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({path:DROPBOX_FOLDER})
}
);

if(response.status!==200) return;

const data=await response.json();
const files=(data.entries||[]).filter(f=>f.name.startsWith("supply_"));

records=await Promise.all(files.map(async file=>{
const res=await dropboxFetch(
"https://content.dropboxapi.com/2/files/download",
{
method:"POST",
headers:{"Dropbox-API-Arg":JSON.stringify({path:file.path_lower})}
}
);
return await res.json();
}));

render();
}

/* ================= ID ================= */

function generateNextId(){
let max=0;
records.forEach(r=>{
const n=parseInt(r.id.replace("SUP-",""));
if(n>max) max=n;
});
return "SUP-"+String(max+1).padStart(4,"0");
}

/* ================= ADD ================= */

async function addRecord(){

const id=generateNextId();

const record={
id,
timestamp:new Date().toISOString(),
user:user.value,
item:item.value,
quantita:Number(qty.value),
stato:"inserito",
tipo:tipo.value,
note:note.value
};

await dropboxFetch(
"https://content.dropboxapi.com/2/files/upload",
{
method:"POST",
headers:{
"Content-Type":"application/octet-stream",
"Dropbox-API-Arg":JSON.stringify({
path:`${DROPBOX_FOLDER}/supply_${id}.json`,
mode:"add"
})
},
body:JSON.stringify(record)
}
);

records.push(record);
render();
}

/* ================= DELETE ================= */

async function deleteRecord(id){

await dropboxFetch(
"https://api.dropboxapi.com/2/files/delete_v2",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({path:`${DROPBOX_FOLDER}/supply_${id}.json`})
}
);

records=records.filter(r=>r.id!==id);
render();
}

/* ================= RENDER ================= */

function render(){
const tbody=document.getElementById("tableBody");
tbody.innerHTML="";
records.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.user}</td>
<td>${r.item}</td>
<td>${r.quantita}</td>
<td>${r.stato}</td>
<td><button class="danger" onclick="deleteRecord('${r.id}')">Elimina</button></td>
</tr>`;
});
}

/* ================= INIT ================= */

handleRedirect();

if(accessToken){
document.getElementById("authCard").classList.add("hidden");
document.getElementById("appContent").classList.remove("hidden");
loadData();
}

</script>

</body>
</html>
