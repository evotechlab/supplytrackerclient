<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Tracker Enterprise</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#f1f5f9;
color:#0f172a;
}

header{
background:#0f172a;
color:white;
padding:18px;
text-align:center;
font-weight:600;
font-size:18px;
transition:.4s ease;
}

.container{ padding:20px; }

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;
margin-bottom:20px;
}

.kpi{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 10px 24px rgba(0,0,0,.06);
}

.kpi h4{
margin:0;
font-size:12px;
text-transform:uppercase;
color:#64748b;
}

.kpi .value{
margin-top:8px;
font-size:24px;
font-weight:700;
}

.card{
background:white;
border-radius:18px;
padding:22px;
box-shadow:0 10px 24px rgba(0,0,0,.06);
margin-bottom:20px;
}

input,select,textarea{
padding:8px;
border-radius:8px;
border:1px solid #e2e8f0;
width:100%;
font-size:14px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
font-weight:600;
}

button.secondary{
background:#64748b;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:10px;
border-bottom:1px solid #e2e8f0;
}

th{
background:#f8fafc;
font-size:12px;
text-transform:uppercase;
}

tr:hover{ background:#f8fafc; }

.hidden{ display:none; }

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:flex;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:18px;
width:320px;
}

canvas{ max-height:240px !important; }

</style>
</head>

<body>

<header>Supply Tracker Enterprise</header>

<div class="container">

<div class="kpi-grid">
<div class="kpi"><h4>Totale</h4><div class="value" id="kpiTotal">0</div></div>
<div class="kpi"><h4>Inseriti</h4><div class="value" id="kpiInserted">0</div></div>
<div class="kpi"><h4>In Lavorazione</h4><div class="value" id="kpiWorking">0</div></div>
<div class="kpi"><h4>Chiusi</h4><div class="value" id="kpiClosed">0</div></div>
<div class="kpi"><h4>Noleggi Attivi</h4><div class="value" id="kpiRental">0</div></div>
</div>

<div class="card">
<h3>Analytics</h3>
<canvas id="statusChart"></canvas>
</div>

<div class="card">
<div style="display:flex;gap:10px;flex-wrap:wrap;">
<input id="searchInput" placeholder="🔎 Ricerca globale..." style="flex:1;">
<select id="statusFilter">
<option value="">Tutti</option>
<option value="inserito">Inseriti</option>
<option value="in_lavorazione">In Lavorazione</option>
<option value="chiuso">Chiusi</option>
</select>
<button onclick="exportPDF()">📄 Export PDF</button>
</div>
</div>

<div class="card">
<h3>Nuovo Record</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
<input id="user" placeholder="User">
<input id="item" placeholder="Item">
<input id="qty" type="number" placeholder="Quantità">
<select id="tipo">
<option value="acquisto">Acquisto</option>
<option value="noleggio">Noleggio</option>
</select>
<input id="dal" type="date" class="hidden">
<input id="al" type="date" class="hidden">
<textarea id="note" placeholder="Note" style="grid-column:span 2;"></textarea>
</div>
<br>
<button onclick="addRecord()">Inserisci</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>ID</th>
<th>User</th>
<th>Item</th>
<th>Q.tà</th>
<th>Tipo</th>
<th>Periodo</th>
<th>Stato</th>
<th>Azioni</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<div id="extendModal" class="modal hidden">
<div class="modal-content">
<h4>Estendi Noleggio</h4>
<input type="date" id="extendDate">
<br><br>
<button onclick="confirmExtend()">Conferma</button>
<button class="secondary" onclick="closeModal()">Annulla</button>
</div>
</div>

<script>

/* ================= CONFIG ================= */

const DROPBOX_APP_KEY="hr483k5j5h2aegt";
const DROPBOX_FOLDER="/supply_records";

let accessToken=localStorage.getItem("db_access");
let refreshToken=localStorage.getItem("db_refresh");

let records=[];
let chart;
let currentExtendId=null;

/* ================= DROPBOX AUTH ================= */

async function refreshAccessToken(){
const response=await fetch("https://api.dropboxapi.com/oauth2/token",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:new URLSearchParams({
grant_type:"refresh_token",
refresh_token:refreshToken,
client_id:DROPBOX_APP_KEY
})
});
const data=await response.json();
accessToken=data.access_token;
localStorage.setItem("db_access",accessToken);
}

async function dropboxFetch(url,options={}){
options.headers=options.headers||{};
options.headers["Authorization"]="Bearer "+accessToken;
let response=await fetch(url,options);
if(response.status===401 && refreshToken){
await refreshAccessToken();
options.headers["Authorization"]="Bearer "+accessToken;
response=await fetch(url,options);
}
return response;
}

/* ================= LOAD RECORDS ================= */

async function loadData(){

const response=await dropboxFetch(
"https://api.dropboxapi.com/2/files/list_folder",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({path:DROPBOX_FOLDER})
}
);

if(response.status!==200) return;

const data=await response.json();
const files=data.entries.filter(f=>f.name.startsWith("supply_"));

records=await Promise.all(files.map(async file=>{
const res=await dropboxFetch(
"https://content.dropboxapi.com/2/files/download",
{
method:"POST",
headers:{"Dropbox-API-Arg":JSON.stringify({path:file.path_lower})}
}
);
return await res.json();
}));

render();
}

/* ================= ID PROGRESSIVO ================= */

function generateNextId(){
let max=0;
records.forEach(r=>{
const num=parseInt(r.id.replace("SUP-",""));
if(num>max) max=num;
});
return "SUP-"+String(max+1).padStart(4,"0");
}

/* ================= ADD RECORD ================= */

async function addRecord(){

const id=generateNextId();

const tipo=document.getElementById("tipo").value;

const record={
id,
timestamp:new Date().toISOString(),
user:document.getElementById("user").value,
item:document.getElementById("item").value,
quantita:Number(document.getElementById("qty").value),
stato:"inserito",
tipo,
noleggio:{
attivo:tipo==="noleggio",
dal:tipo==="noleggio"?document.getElementById("dal").value:null,
al:tipo==="noleggio"?document.getElementById("al").value:null,
storico_estensioni:[]
},
note:document.getElementById("note").value
};

await dropboxFetch(
"https://content.dropboxapi.com/2/files/upload",
{
method:"POST",
headers:{
"Content-Type":"application/octet-stream",
"Dropbox-API-Arg":JSON.stringify({
path:`${DROPBOX_FOLDER}/supply_${id}.json`,
mode:"add"
})
},
body:JSON.stringify(record)
}
);

records.push(record);
render();
}

/* ================= RENDER ================= */

function render(){

const search=document.getElementById("searchInput").value?.toLowerCase()||"";
const filter=document.getElementById("statusFilter").value;

let filtered=records.filter(r=>{
const matchSearch=
r.user.toLowerCase().includes(search)||
r.item.toLowerCase().includes(search)||
r.id.toLowerCase().includes(search);
const matchStatus=filter? r.stato===filter:true;
return matchSearch && matchStatus;
});

let inserted=0,working=0,closed=0,rental=0;

filtered.forEach(r=>{
if(r.stato==="inserito") inserted++;
if(r.stato==="in_lavorazione") working++;
if(r.stato==="chiuso") closed++;
if(r.tipo==="noleggio" && r.stato!=="chiuso") rental++;
});

document.getElementById("kpiTotal").innerText=records.length;
document.getElementById("kpiInserted").innerText=inserted;
document.getElementById("kpiWorking").innerText=working;
document.getElementById("kpiClosed").innerText=closed;
document.getElementById("kpiRental").innerText=rental;

const tbody=document.getElementById("tableBody");
tbody.innerHTML="";

filtered.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.id}</td>
<td>${r.user}</td>
<td>${r.item}</td>
<td>${r.quantita}</td>
<td>${r.tipo}</td>
<td>${r.tipo==="noleggio"?r.noleggio.dal+" → "+r.noleggio.al:"-"}</td>
<td>
<select onchange="changeStatus('${r.id}',this.value)">
<option value="inserito" ${r.stato==="inserito"?"selected":""}>INSERITO</option>
<option value="in_lavorazione" ${r.stato==="in_lavorazione"?"selected":""}>IN LAVORAZIONE</option>
<option value="chiuso" ${r.stato==="chiuso"?"selected":""}>CHIUSO</option>
</select>
</td>
<td>
${r.tipo==="noleggio" && r.stato!=="chiuso"?
`<button onclick="openExtend('${r.id}')">Estendi</button>`:""}
</td>
</tr>`;
});

updateChart(inserted,working,closed);
}

/* ================= STATUS UPDATE ================= */

async function changeStatus(id,newStatus){
const r=records.find(x=>x.id===id);
r.stato=newStatus;

await dropboxFetch(
"https://content.dropboxapi.com/2/files/upload",
{
method:"POST",
headers:{
"Content-Type":"application/octet-stream",
"Dropbox-API-Arg":JSON.stringify({
path:`${DROPBOX_FOLDER}/supply_${id}.json`,
mode:"overwrite"
})
},
body:JSON.stringify(r)
}
);

render();
}

/* ================= EXTENSION MODAL ================= */

function openExtend(id){
currentExtendId=id;
document.getElementById("extendModal").classList.remove("hidden");
}

function closeModal(){
document.getElementById("extendModal").classList.add("hidden");
}

async function confirmExtend(){

const newEnd=document.getElementById("extendDate").value;
if(!newEnd) return;

const r=records.find(x=>x.id===currentExtendId);

r.noleggio.storico_estensioni.push({
dal:r.noleggio.al,
al:newEnd,
timestamp:new Date().toISOString()
});

r.noleggio.al=newEnd;

await changeStatus(r.id,r.stato);

closeModal();
}

/* ================= CHART ================= */

function updateChart(inserted,working,closed){

const ctx=document.getElementById("statusChart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'doughnut',
data:{
labels:['Inseriti','In Lavorazione','Chiusi'],
datasets:[{
data:[inserted,working,closed],
backgroundColor:['#ef4444','#facc15','#22c55e']
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{position:'bottom'}}
}
});
}

/* ================= PDF ================= */

async function exportPDF(){
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
doc.text("Supply Audit Report",14,15);
let y=25;
records.forEach(r=>{
doc.text(`${r.id} | ${r.user} | ${r.stato} | ${r.item}`,14,y);
y+=6;
if(y>280){doc.addPage();y=20;}
});
doc.save("supply_audit_report.pdf");
}

/* ================= INIT ================= */

document.getElementById("tipo").addEventListener("change",()=>{
const isRental=document.getElementById("tipo").value==="noleggio";
document.getElementById("dal").classList.toggle("hidden",!isRental);
document.getElementById("al").classList.toggle("hidden",!isRental);
});

document.getElementById("searchInput").addEventListener("input",render);
document.getElementById("statusFilter").addEventListener("change",render);

loadData();

</script>

</body>
</html>
